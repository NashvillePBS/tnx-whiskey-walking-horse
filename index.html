<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whiskey &amp; Walking-Horse Country — A Crossroads Road Trip — Tennessee Crossroads</title>
<meta name="description" content="Four decades of Tennessee Crossroads, gathered into one road trip through Lynchburg, Tullahoma, and Shelbyville — whiskey hollows, walking horses, and hometown squares. Every stop is a real segment you can watch.">
<meta name="theme-color" content="#314289">
<meta property="og:title" content="Whiskey &amp; Walking-Horse Country — A Crossroads Road Trip — Tennessee Crossroads">
<meta property="og:description" content="Four decades of back-road stories along one loop through Lynchburg, Tullahoma, and Shelbyville. Every stop is a real Crossroads segment you can watch.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23314289'/%3E%3Ccircle cx='32' cy='32' r='12' fill='%23AE3238'/%3E%3Ccircle cx='32' cy='32' r='5' fill='%23fff'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Rubik+Mono+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  /* =====================================================================
     CROSSROADS GUIDE DESIGN TOKENS — v2 (show-led)
     Two tiers: the TENNESSEE CROSSROADS show palette leads every guide
     page; the NASHVILLE PBS brand palette carries attribution and the
     derivative formats. City builds change CONTENT ONLY (CONTENT-CONTRACT.md).
     ===================================================================== */
  :root{
    /* -- Show palette (leads the guide) --------------------------------- */
    --tnx-blue:#314289;       /* show denim blue — headings, links, footer band (9.2:1 on white) */
    --tnx-blue-deep:#26346E;  /* darker blue — hover, gradients */
    --tnx-red:#AE3238;        /* show barn red — ribbons, pins, accents (6.3:1 on white; white text on it 6.3:1) */
    --tnx-red-deep:#8E272C;   /* darker red — hover */

    /* -- Nashville PBS brand (attribution + derivative formats) ---------- */
    --npbs-blue:#2638C4; --npbs-navy:#0A145A; --npbs-teal:#48D3CD;
    --npbs-coral:#FE704E; --npbs-yellow:#FFCF00;

    /* -- Color roles ------------------------------------------------------ */
    --c-bg:#ffffff;
    --c-bg-tint:#F3F4F9;
    --c-ink:#20263F;                     /* body text (14.9:1) */
    --c-ink-soft:#3C4566;                /* secondary text (9.0:1) */
    --c-muted:#5A6284;                   /* meta text (5.6:1) */
    --c-line:#E0E3EF;
    --c-head:var(--tnx-blue);
    --c-action:var(--tnx-blue);
    --c-accent:var(--tnx-red);
    --c-band:var(--tnx-blue);            /* footer band */
    --c-band-ink:#ffffff;
    --c-band-soft:#CBD3F0;               /* on band (7.0:1) */
    --c-band-faint:#A4B0E0;              /* on band (4.6:1) */
    --c-focus:rgba(49,66,137,.45);

    /* -- Type -------------------------------------------------------------- */
    --f-sans:"Open Sans",system-ui,-apple-system,sans-serif;
    --f-label:"Rubik Mono One",monospace;         /* show's ribbon/label face */
    --fs-hero:clamp(2.5rem,7.5vw,5.4rem);
    --fs-h3:1.3rem;
    --fs-lede:clamp(1.02rem,1.5vw,1.25rem);
    --fs-body:.96rem;
    --fs-small:13px;
    --fs-label:11.5px;
    --track-label:.1em;

    /* -- Space / shape / elevation ----------------------------------------- */
    --sp-1:4px; --sp-2:8px; --sp-3:14px; --sp-4:20px;
    --sp-5:28px; --sp-6:44px; --sp-7:64px; --sp-8:96px;
    --r-media:12px; --r-pill:40px;
    --skew:-12deg;                        /* show ribbon slant */
    --shadow-card:0 18px 40px -22px rgba(38,52,110,.35);
    --container:1180px;
    --pad-x:28px;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0; background:var(--c-bg); color:var(--c-ink);
    font-family:var(--f-sans); line-height:1.65;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}
  img{display:block; max-width:100%;}
  .wrap{max-width:var(--container); margin:0 auto; padding-left:var(--pad-x); padding-right:var(--pad-x);}
  :focus-visible{outline:3px solid var(--c-focus); outline-offset:2px; border-radius:3px;}

  /* ---------- SHOW RIBBON (signature element) ---------- */
  .ribbon{
    display:inline-block; background:var(--tnx-red); color:#fff;
    font-family:var(--f-label); font-size:var(--fs-label); line-height:1;
    letter-spacing:var(--track-label); text-transform:uppercase;
    padding:9px 18px; transform:skewX(var(--skew)); line-height:1.7;
  }
  .ribbon>span{display:inline-block; transform:skewX(calc(var(--skew) * -1)); font-style:italic;}

  /* ---------- TOP BAR ---------- */
  .bar-in{
    padding-top:16px; padding-bottom:12px;
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    border-bottom:1px solid var(--c-line);
  }
  .word{
    font-family:var(--f-label); font-size:12px; letter-spacing:.08em;
    color:var(--tnx-blue); text-decoration:none;
    display:flex; align-items:center; gap:10px;
  }
  .word .pin{width:9px; height:9px; border-radius:50%; background:var(--tnx-red);
    box-shadow:0 0 0 3px rgba(174,50,56,.18); flex:none;}
  .draft{
    font-family:var(--f-sans); font-weight:700; font-size:10.5px;
    letter-spacing:.14em; text-transform:uppercase; color:var(--c-muted);
    border:1px dashed var(--c-line); border-radius:var(--r-pill); padding:5px 12px; white-space:nowrap;
  }

  /* ---------- HERO (light, road-map motif) ---------- */
  .hero{position:relative; padding-top:clamp(44px,6vw,76px); padding-bottom:46px; overflow:hidden;}
  .hero-roads{position:absolute; inset:0; pointer-events:none; color:var(--tnx-blue); opacity:.07;}
  .hero-in{position:relative;}
  .hero h1{
    font-family:var(--f-sans); font-weight:800;
    font-size:var(--fs-hero); line-height:1.02; letter-spacing:-.03em;
    margin:26px 0 0; color:var(--tnx-blue);
  }
  .hero h1 em{font-style:italic; color:var(--tnx-red);}
  .hero-sub{font-size:var(--fs-lede); max-width:58ch; color:var(--c-ink-soft); margin:22px 0 0;}
  .hero-route{margin:30px 0 4px; width:100%; max-width:640px;}
  .hero-meta{
    font-family:var(--f-label); font-size:11px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--c-muted); margin:10px 0 0;
  }

  /* ---------- FILTER (the only sticky element) ---------- */
  .filter{
    position:sticky; top:0; z-index:1001; background:rgba(255,255,255,.94);
    backdrop-filter:saturate(1.4) blur(8px);
    border-top:1px solid var(--c-line); border-bottom:1px solid var(--c-line);
    transition:box-shadow .3s;
  }
  .filter.stuck{box-shadow:0 6px 24px -18px rgba(38,52,110,.5);}
  .filter-in{
    padding-top:12px; padding-bottom:12px;
    display:flex; gap:10px; overflow-x:auto; scrollbar-width:none;
  }
  .filter-in::-webkit-scrollbar{display:none;}
  .chip{
    font-family:var(--f-sans); font-weight:700; font-size:13.5px;
    letter-spacing:.02em; white-space:nowrap; cursor:pointer;
    background:transparent; color:var(--c-muted);
    border:1.5px solid var(--c-line); border-radius:var(--r-pill);
    padding:10px 18px; min-height:44px;
    transition:border-color .2s ease, color .2s ease, background .2s ease;
  }
  .chip:hover{border-color:var(--c-action); color:var(--c-action);}
  .chip[aria-pressed="true"]{background:var(--c-action); border-color:var(--c-action); color:#fff;}
  .chip:focus-visible{outline:3px solid var(--c-focus); outline-offset:2px;}

  /* ---------- MAP ---------- */
  .map-sec{padding-top:44px;}
  .map-head{display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:14px;}
  .map-head p{margin:0; color:var(--c-ink-soft); font-size:var(--fs-body);}
  #map{
    height:min(62vh,520px); border-radius:var(--r-media);
    border:1px solid var(--c-line); box-shadow:var(--shadow-card);
    background:var(--c-bg-tint); z-index:0;
  }
  .pin-marker{background:none; border:none;}
  .pin-marker .pin-box{
    display:flex; align-items:center; justify-content:center;
    width:27px; height:27px; background:var(--tnx-red); color:#fff;
    font-family:var(--f-label); font-size:11px; line-height:1;
    border-radius:7px; transform:skewX(var(--skew));
    box-shadow:0 3px 8px rgba(32,38,63,.45), 0 0 0 2px #fff;
  }
  .pin-marker .pin-box>span{transform:skewX(calc(var(--skew) * -1));}
  .leaflet-popup-content{font-family:var(--f-sans); font-size:13.5px; line-height:1.5; margin:12px 16px;}
  .leaflet-popup-content b{color:var(--tnx-blue); font-size:14.5px;}
  .leaflet-popup-content .p-cat{color:var(--c-muted); font-size:11px; text-transform:uppercase; letter-spacing:.08em; font-weight:700;}
  .leaflet-popup-content a{color:var(--tnx-blue); font-weight:700;}
  .map-note{font-size:12px; color:var(--c-muted); margin:10px 2px 0;}

  /* ---------- SECTIONS ---------- */
  main{padding-top:8px; padding-bottom:40px;}
  .sec-head{padding:52px 0 24px; max-width:64ch;}
  .sec-head p{color:var(--c-ink-soft); margin:14px 0 0; font-size:1.02rem;}

  /* ---------- GRID + CARDS ---------- */
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
    gap:34px 30px; padding-top:8px;
  }
  .stop{
    display:flex; flex-direction:column;
    opacity:0; transform:translateY(18px); transition:opacity .6s ease, transform .6s ease;
  }
  .stop.in{opacity:1; transform:none;}
  .stop.hide{display:none;}
  .stop-media{
    position:relative; display:block; border-radius:var(--r-media); overflow:hidden;
    aspect-ratio:4/3; background:var(--c-bg-tint); border:1px solid var(--c-line);
    text-decoration:none;
  }
  .stop-media img{
    width:100%; height:100%; object-fit:cover;
    transition:transform .7s cubic-bezier(.2,.7,.2,1);
  }
  .stop-media:hover img{transform:scale(1.05);}
  .stop-media.noimg{display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,var(--tnx-blue),var(--tnx-blue-deep));}
  .stop-media.noimg::after{
    content:attr(data-name); color:var(--c-band-soft); font-family:var(--f-sans);
    font-style:italic; font-weight:600; font-size:1.05rem; text-align:center; padding:0 22px;
  }
  .cat-tag{
    position:absolute; top:12px; left:8px;
    font-family:var(--f-label); font-size:9.5px; letter-spacing:.08em; line-height:1;
    text-transform:uppercase; color:#fff; background:var(--tnx-red);
    padding:7px 12px; transform:skewX(var(--skew));
  }
  .cat-tag>span{display:inline-block; transform:skewX(calc(var(--skew) * -1)); font-style:italic;}
  .stop-body{padding:18px 4px 0; display:flex; flex-direction:column; flex:1;}
  .stop h3{
    font-family:var(--f-sans); font-weight:800; font-size:var(--fs-h3); line-height:1.2;
    margin:0; letter-spacing:-.015em; color:var(--tnx-blue);
  }
  .credit{font-style:italic; font-size:.92rem; color:var(--c-muted); margin:4px 0 0;}
  .blurb{font-size:var(--fs-body); color:var(--c-ink-soft); margin:12px 0 16px;}
  .watch{
    font-family:var(--f-label); font-size:11px; letter-spacing:.06em;
    color:var(--c-action); text-decoration:none; text-transform:uppercase;
    display:inline-flex; align-items:center; gap:9px; margin-top:auto;
    min-height:44px;
  }
  .watch .arw{transition:transform .25s ease; color:var(--tnx-red); font-family:var(--f-sans); font-weight:800; font-size:15px;}
  .watch:hover{color:var(--tnx-blue-deep); text-decoration:underline;}
  .watch:hover .arw{transform:translateX(5px);}
  .meta{
    font-size:12px; color:var(--c-muted);
    margin:8px 0 0; padding-top:12px; border-top:1px solid var(--c-line);
    display:flex; flex-wrap:wrap; gap:6px 10px; align-items:center;
  }
  .meta a{color:var(--c-action); font-weight:600; text-decoration:none; border-bottom:1px solid var(--c-line);}
  .meta a:hover{border-color:var(--c-action);}
  .meta .free{background:var(--tnx-red); color:#fff; font-weight:800; font-size:10px;
    letter-spacing:.08em; text-transform:uppercase; padding:3px 9px; border-radius:20px;}

  .empty{display:none; text-align:center; color:var(--c-muted); padding:60px 0;
    font-style:italic; font-size:1.15rem;}

  /* ---------- FOOTER ---------- */
  footer{background:var(--c-band); color:var(--c-band-ink); margin-top:56px; padding:66px 0 54px;}
  .foot-in{text-align:center;}
  .foot-in .tag{
    font-style:italic; font-weight:600; font-size:clamp(1.25rem,2.4vw,1.75rem);
    color:#fff; max-width:26ch; margin:0 auto 30px; line-height:1.35;
  }
  .foot-in .route-foot{max-width:520px; margin:0 auto 30px;}
  .foot-in .foot-note{
    font-size:15px; color:var(--c-band-soft); line-height:1.75;
    max-width:52ch; margin:0 auto;
  }
  .foot-in .colophon{color:var(--c-band-faint); font-size:12px; margin-top:26px; letter-spacing:.04em;}
  .foot-in .colophon b{color:#fff; font-weight:700;}

  /* ---------- PRINT ITINERARY ---------- */
  .print-only{display:none;}
  .print-btn{
    margin-top:24px; display:inline-flex; align-items:center; gap:9px;
    font-family:var(--f-label); font-size:11px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--c-action); background:transparent; border:1.5px solid var(--c-action);
    padding:11px 18px; min-height:44px; cursor:pointer;
    transition:background .2s ease, color .2s ease;
  }
  .print-btn:hover{background:var(--c-action); color:#fff;}
  .print-btn .pr-ic{font-family:var(--f-sans); font-weight:800;}
  @media print{
    @page{size:letter; margin:11mm 12mm;}
    body>*:not(#print-doc){display:none !important;}
    .print-only{display:block !important;}
    body{background:#fff; color:#111; font-size:10pt; line-height:1.35;}
    .print-head{display:flex; align-items:center; gap:20px; border-bottom:2.5pt solid #25408f; padding-bottom:10px;}
    .print-logo-tnx{width:110px; height:auto; flex:none;}
    .print-title h1{font-family:var(--f-sans); font-weight:800; font-size:19pt; color:#25408f; margin:0; letter-spacing:-.02em; line-height:1.05;}
    .print-title p{font-family:var(--f-label); font-size:7.5pt; letter-spacing:.08em; text-transform:uppercase; color:#444; margin:5px 0 0;}
    .print-sec{margin-top:13px;}
    .print-sec h2{font-family:var(--f-label); font-size:9pt; color:#ae3238; text-transform:uppercase; letter-spacing:.08em; border-bottom:1.5pt solid #ae3238; padding-bottom:3px; margin:0 0 7px;}
    .print-list{list-style:none; margin:0; padding:0; columns:2; column-gap:28px;}
    .print-list li{display:flex; gap:7px; break-inside:avoid; margin:0 0 7px; font-size:9pt; line-height:1.3;}
    .pi-check{width:9pt; height:9pt; border:1.2pt solid #25408f; border-radius:2pt; margin-top:2pt; flex:none;}
    .pi-body b{color:#25408f; font-weight:700;}
    .pi-meta{color:#333; font-size:8pt;}
    .print-foot{margin-top:16px; border-top:1.5pt solid #25408f; padding-top:10px; display:flex; align-items:center; gap:16px;}
    .print-logo-npbs{width:148px; height:auto; flex:none;}
    .print-foot-text p{font-size:7.5pt; color:#333; margin:0 0 3px; letter-spacing:.02em;}
    .print-foot-text b{color:#111;}
    #print-note{font-style:italic; font-size:8.5pt; color:#25408f;}
  }

  @media (max-width:640px){
    :root{--pad-x:20px; --fs-label:10px;}
    .grid{grid-template-columns:1fr; gap:30px;}
    .draft{display:none;}
    #map{height:52vh;}
  }
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto;}
    .stop{opacity:1; transform:none; transition:none;}
    .stop-media img{transition:none;}
  }
</style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="wrap bar-in" id="top">
    <a class="word" href="#top"><span class="pin"></span><span id="show-name"></span></a>
    <span class="draft">Draft · Internal Review</span>
  </div>

  <!-- HERO -->
  <div class="hero">
    <svg class="hero-roads" viewBox="0 0 1200 420" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <path d="M-40 300 C 260 180, 520 420, 840 240 S 1180 120, 1260 180" stroke="currentColor" stroke-width="3" stroke-dasharray="14 10" fill="none"/>
      <path d="M-40 80 C 300 200, 700 40, 1260 320" stroke="currentColor" stroke-width="3" stroke-dasharray="2 12" stroke-linecap="round" fill="none"/>
      <circle cx="522" cy="205" r="6" fill="currentColor"/>
    </svg>
    <header class="hero-in wrap">
      <span class="ribbon"><span id="hero-eyebrow"></span></span>
      <h1 id="hero-title"></h1>
      <p class="hero-sub" id="hero-sub"></p>
      <svg class="hero-route" viewBox="0 0 640 26" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M8 13 H632" stroke="#314289" stroke-width="2.5" stroke-dasharray="1 13" stroke-linecap="round" opacity=".55"/>
        <circle cx="8" cy="13" r="7" fill="#AE3238"/><circle cx="8" cy="13" r="2.6" fill="#fff"/>
        <path d="M632 13 l-11 -6 v12 z" fill="#314289"/>
      </svg>
      <p class="hero-meta" id="hero-meta"></p>
      <button class="print-btn" type="button" onclick="window.print()">Print the itinerary <span class="pr-ic" aria-hidden="true">&rarr;</span></button>
    </header>
  </div>

  <!-- FILTER (sticky) -->
  <div class="filter" id="filter">
    <div class="wrap filter-in" id="chips" aria-label="Filter stops by category"></div>
  </div>

  <!-- MAP -->
  <section class="map-sec wrap" aria-label="Map of all stops">
    <div class="map-head">
      <span class="ribbon"><span>The Map</span></span>
      <p id="map-lede"></p>
    </div>
    <div id="map"></div>
    <p class="map-note" id="map-note">Tap a pin for the stop and its segment. Numbers match the list below.</p>
  </section>

  <main id="guide" class="wrap"></main>
  <p class="empty" id="empty">No stops in that category yet.</p>

  <!-- PRINT ITINERARY (hidden on screen; the only thing that prints) -->
  <div id="print-doc" class="print-only" aria-hidden="true">
    <header class="print-head">
      <svg class="print-logo-tnx" viewBox="0 0 458.2 244.2" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tennessee Crossroads">

          <path d="M83.7,159.8l-.5-.6c8.1.6,15.2-2.5,17.8-8.1,1.7-3.1,2.4-8.7.8-12.2-1.7-4.1-4.9-7.6-10.1-8.9-2.4-.3-2.9-.2-10.2-.2v-5.4c5,.2,10.5-.7,14.8,1.5,7.7,3.7,11.8,10,11.8,19.1s-5.4,15.2-13.9,18.3c4.5,5.9,19.4,23.2,19.4,23.2h-7.7l-22.1-26.7Z"/>

        <circle cx="512" cy="10" r="5.5" fill="#ffffff"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
/* =====================================================================
   CITY CONTENT lives in data/guide.json — the only file that changes
   between guides. See CONTENT-CONTRACT.md for the Airtable field behind
   each key. The web page and the print pipeline both read it.
   ===================================================================== */
let GUIDE = {}, SECTIONS = [], LABELS = {}, TOTAL = 0, ALL_STOPS = [];

function prepare(data){
  GUIDE = data.guide; SECTIONS = data.sections;
  LABELS = Object.fromEntries(SECTIONS.map(s=>[s.key, s.title]));
  TOTAL = SECTIONS.reduce((n,s)=>n+s.stops.length, 0);
  let stopNo = 0;
  SECTIONS.forEach((sec,i)=>{ sec.mk = String(i+1).padStart(2,"0");
    sec.stops.forEach(s=>{ s.no = ++stopNo; s.cat = sec.key; }); });
  ALL_STOPS = SECTIONS.flatMap(s=>s.stops);
}

function renderChrome(){
  document.getElementById("show-name").textContent = GUIDE.show;
  document.getElementById("hero-eyebrow").textContent = GUIDE.eyebrow;
  document.getElementById("hero-title").innerHTML = GUIDE.titleHTML;
  document.getElementById("hero-sub").textContent = GUIDE.sub;
  document.getElementById("hero-meta").textContent = `${TOTAL} stops · ${GUIDE.metaNote}`;
  document.getElementById("map-lede").textContent = GUIDE.mapLede;
  document.getElementById("foot-quote").textContent = GUIDE.quote;
  document.getElementById("foot-note").textContent = GUIDE.note;
  document.getElementById("foot-colophon").innerHTML = GUIDE.colophonHTML;

  const chips = [`<button class="chip" aria-pressed="true" data-filter="all">All ${TOTAL} Stops</button>`]
    .concat(SECTIONS.map(s=>`<button class="chip" aria-pressed="false" data-filter="${s.key}">${s.title}</button>`));
  document.getElementById("chips").innerHTML = chips.join("");
}

function cardHTML(s, cat){
  const credit = s.host ? `as seen with ${s.host}` : "from the Crossroads archive";
  const free = s.free ? `<span class="free">Free</span>` : "";
  const phone = s.phone ? `<span aria-hidden="true">·</span><a href="tel:${s.phone.replace(/[^0-9+]/g,"")}">${s.phone}</a>` : "";
  const site = s.site ? `<a href="${s.siteUrl}" target="_blank" rel="noopener">${s.site}</a>` : "";
  const dot = (s.site) ? `<span aria-hidden="true">·</span>` : "";
  const num = String(s.no).padStart(2,"0");
  return `<article class="stop" data-cat="${cat}">
    <a class="stop-media" data-name="${s.name}" href="${s.link}" target="_blank" rel="noopener">
      <img src="${s.img}" alt="${s.name}" loading="lazy" referrerpolicy="no-referrer"
           onerror="this.parentElement.classList.add('noimg'); this.style.display='none';">
      <span class="cat-tag"><span>${num} · ${LABELS[cat]}</span></span>
    </a>
    <div class="stop-body">
      <h3>${s.name}</h3>
      <p class="credit">${credit}</p>
      <p class="blurb">${s.blurb}</p>
      <a class="watch" href="${s.link}" target="_blank" rel="noopener">Watch the segment <span class="arw" aria-hidden="true">&rarr;</span></a>
      <p class="meta"><span>${s.addr}</span>${phone}${dot}${site}${free}</p>
    </div>
  </article>`;
}

function render(){
  const root = document.getElementById("guide");
  root.innerHTML = SECTIONS.map(sec=>{
    const cards = sec.stops.map(s=>cardHTML(s, sec.key)).join("");
    return `<section class="sec" data-sec="${sec.key}">
      <div class="sec-head">
        <span class="ribbon"><span>${sec.mk} / ${sec.title}</span></span>
        <p>${sec.intro}</p>
      </div>
      <div class="grid">${cards}</div>
    </section>`;
  }).join("");
  observeCards();
}

/* scroll reveal */
function observeCards(){
  const cards = document.querySelectorAll(".stop");
  if(!("IntersectionObserver" in window)){ cards.forEach(c=>c.classList.add("in")); return; }
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target);} });
  }, {rootMargin:"1000% 0px -8% 0px", threshold:.08});
  cards.forEach(c=>io.observe(c));
}

/* ---------- map ---------- */
let map = null, markers = [];
function initMap(){
  if(typeof L === "undefined"){ document.querySelector(".map-sec").style.display = "none"; return; }
  map = L.map("map", {scrollWheelZoom:false});
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",
    {attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors', maxZoom:19}).addTo(map);
  markers = ALL_STOPS.filter(s=>Number.isFinite(s.lat) && Number.isFinite(s.lng)).map(s=>{
    const icon = L.divIcon({className:"pin-marker",
      html:`<div class="pin-box"><span>${s.no}</span></div>`,
      iconSize:[27,27], iconAnchor:[13,13], popupAnchor:[0,-12]});
    const m = L.marker([s.lat, s.lng], {icon, alt:s.name, title:s.name});
    m.bindPopup(`<span class="p-cat">${String(s.no).padStart(2,"0")} · ${LABELS[s.cat]}</span><br><b>${s.name}</b><br>` +
      `<a href="${s.link}" target="_blank" rel="noopener">Watch the segment &rarr;</a>`);
    m._cat = s.cat;
    return m;
  });
  const unpinned = ALL_STOPS.length - markers.length;
  if(unpinned > 0){
    document.getElementById("map-note").textContent +=
      ` ${unpinned} ${unpinned===1?"stop has":"stops have"} no public street address and ${unpinned===1?"isn't":"aren't"} pinned.`;
  }
  fitVisible("all");
}
function fitVisible(key){
  if(!map) return;
  const visible = markers.filter(m=>key==="all"||m._cat===key);
  markers.forEach(m=>{ (key==="all"||m._cat===key) ? m.addTo(map) : m.removeFrom(map); });
  if(visible.length) map.fitBounds(L.latLngBounds(visible.map(m=>m.getLatLng())).pad(0.18));
}

/* filtering */
function setFilter(key){
  document.querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed", String(c.dataset.filter===key)));
  let anyVisible=false;
  document.querySelectorAll(".sec").forEach(sec=>{
    let secVisible=false;
    sec.querySelectorAll(".stop").forEach(st=>{
      const show = key==="all" || st.dataset.cat===key;
      st.classList.toggle("hide", !show);
      if(show){ st.classList.add("in"); secVisible=true; anyVisible=true; }
    });
    sec.style.display = secVisible ? "" : "none";
  });
  document.getElementById("empty").style.display = anyVisible ? "none" : "block";
  fitVisible(key);
}

/* ---------- print itinerary (same data, home-printer friendly) ---------- */
function renderPrint(){
  const plainTitle = GUIDE.titleHTML.replace(/<br\s*\/?>/gi, " ").replace(/<[^>]+>/g, "");
  document.getElementById("print-title").textContent = plainTitle;
  document.getElementById("print-meta").textContent =
    `${TOTAL} stops · ${GUIDE.metaNote} · tennesseecrossroads.org`;
  document.getElementById("print-itinerary").innerHTML = SECTIONS.map(sec=>`
    <section class="print-sec">
      <h2>${sec.mk} / ${sec.title}</h2>
      <ul class="print-list">
        ${sec.stops.map(s=>{
          const bits = [s.addr, s.phone, s.site, s.free ? "Free" : ""].filter(Boolean).join(" · ");
          return `<li><span class="pi-check" aria-hidden="true"></span>
            <span class="pi-body"><b>${String(s.no).padStart(2,"0")} · ${s.name}</b><br>
            <span class="pi-meta">${bits}</span></span></li>`;
        }).join("")}
      </ul>
    </section>`).join("");
  document.getElementById("print-note").textContent = GUIDE.note;
  document.getElementById("print-colophon").innerHTML = GUIDE.colophonHTML;
}

fetch("data/guide.json").then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); }).then(data=>{
  prepare(data);
  renderChrome(); render(); initMap(); renderPrint();
}).catch(err=>{
  console.error("guide data failed to load", err);
  document.getElementById("guide").innerHTML =
    '<p class="empty" style="display:block">Could not load the guide content — please refresh.</p>';
});
document.getElementById("chips").addEventListener("click", (e)=>{
  const chip = e.target.closest(".chip");
  if(chip) setFilter(chip.dataset.filter);
});

/* sticky filter shadow */
const filterEl = document.getElementById("filter");
window.addEventListener("scroll", ()=>{
  filterEl.classList.toggle("stuck", filterEl.getBoundingClientRect().top<=0 && window.scrollY>10);
}, {passive:true});
</script>
</body>
</html>
